<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הרשמה | מערכת מבחנים</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="nav"></div>

  <main class="container">
    <section class="card" style="max-width: 520px; margin: 0 auto;">
      <h1>הרשמה</h1>
      <p>צור חשבון חדש כמורה או סטודנט.</p>
      <div id="message"></div>
      <form id="registerForm">
        <div class="form-group">
          <label for="name">שם מלא</label>
          <input id="name" required>
        </div>
        <div class="form-group">
          <label for="idNumber">תעודת זהות</label>
          <input id="idNumber" required>
        </div>
        <div class="form-group">
          <label for="email">אימייל</label>
          <input id="email" type="email" required>
        </div>
        <div class="form-group">
          <label for="password">סיסמה</label>
          <input id="password" type="password" required>
        </div>
        <div class="form-group">
          <label for="role">סוג משתמש</label>
          <select id="role" required>
            <option value="student">סטודנט</option>
            <option value="teacher">מורה</option>
          </select>
        </div>
        <button class="btn btn-primary" type="submit">הירשם</button>
      </form>
    </section>
  </main>

  <script type="module" src="js/pages/register.js"></script>
</body>
</html>
