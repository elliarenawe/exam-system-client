<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>יצירת מבחן | מערכת מבחנים</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div id="nav"></div>

  <main class="container">
    <section class="card">
      <h1>יצירת מבחן</h1>
      <div id="message"></div>
      <form id="createExamForm">
        <div class="grid-2">
          <div class="form-group">
            <label for="name">שם המבחן</label>
            <input id="name" required>
          </div>
          <div class="form-group">
            <label for="category">קטגוריה</label>
            <input id="category" value="כללי">
          </div>
        </div>
        <div class="form-group">
          <label for="description">תיאור</label>
          <textarea id="description"></textarea>
        </div>
        <div class="form-group">
          <label for="durationMinutes">משך זמן (דקות)</label>
          <input id="durationMinutes" type="number" min="1" value="30" required>
        </div>
        <button class="btn btn-primary" type="submit">צור מבחן</button>
      </form>
    </section>
  </main>

  <script type="module" src="../js/pages/createExam.js"></script>
</body>
</html>
