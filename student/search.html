<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Exam</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div id="nav"></div>

  <main class="container">
    <section class="card">
      <h1>Search Exam</h1>
      <form id="searchForm" class="grid-2">
        <div class="form-group">
          <label for="query">Search by name or code</label>
          <input id="query" placeholder="Exam name or code" required>
        </div>
        <div class="form-group" style="display:flex; align-items:flex-end;">
          <button class="btn btn-primary" type="submit">Search</button>
        </div>
      </form>
      <div id="searchResults"></div>
    </section>
  </main>

  <script type="module" src="../js/pages/searchExam.js"></script>
</body>
</html>
