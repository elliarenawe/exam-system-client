<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>חיפוש מבחן | מערכת מבחנים</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div id="nav"></div>

  <main class="container">
    <section class="card">
      <h1>חיפוש מבחן</h1>
      <p>חפש לפי שם מבחן או קוד מבחן</p>
      <form id="searchForm" class="grid-2">
        <div class="form-group">
          <label for="query">חיפוש</label>
          <input id="query" placeholder="שם או קוד מבחן" required>
        </div>
        <div class="form-group" style="display:flex; align-items:flex-end;">
          <button class="btn btn-primary" type="submit">חפש</button>
        </div>
      </form>
      <div id="searchResults"></div>
    </section>

    <section class="card">
      <h2>מבחנים זמינים</h2>
      <div id="availableExams"></div>
    </section>
  </main>

  <script type="module" src="../js/pages/searchExam.js"></script>
</body>
</html>
