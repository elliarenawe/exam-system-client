<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>חיפוש מבחן | מערכת מבחנים</title>
  <script src="../js/theme-init.js"></script>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div id="nav"></div>

  <main class="container">
    <section class="card">
      <h1>חיפוש וסינון מבחנים</h1>
      <p>חפש לפי שם או קוד, וסנן לפי קטגוריה ורמת קושי</p>
      <form id="searchForm" class="grid-2">
        <div class="form-group">
          <label for="query">חיפוש</label>
          <input id="query" placeholder="שם או קוד מבחן">
        </div>
        <div class="form-group">
          <label for="categoryFilter">קטגוריה</label>
          <select id="categoryFilter">
            <option value="">כל הקטגוריות</option>
          </select>
        </div>
        <div class="form-group">
          <label for="difficultyFilter">רמת קושי</label>
          <select id="difficultyFilter">
            <option value="">כל הרמות</option>
            <option value="easy">קל</option>
            <option value="medium">בינוני</option>
            <option value="hard">קשה</option>
          </select>
        </div>
        <div class="form-group actions" style="align-items:flex-end;">
          <button class="btn btn-primary" type="submit">חפש וסנן</button>
          <button class="btn btn-secondary" type="button" id="clearFiltersBtn">נקה סינון</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>מבחנים זמינים</h2>
      <div id="examResults"></div>
    </section>
  </main>

  <script type="module" src="../js/pages/searchExam.js?v=3"></script>
</body>
</html>
